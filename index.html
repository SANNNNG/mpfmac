<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPF Pro Master</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --warning: #fbbc04; --dark: #202124; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', 'PingFang TC', sans-serif; background: var(--bg); margin: 0; }
        .navbar { background: var(--dark); color: white; padding: 0 30px; display: flex; align-items: center; height: 70px; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { width: 24px; height: 24px; fill: var(--warning); }
        .nav-item { cursor: pointer; padding: 10px 18px; border-radius: 10px; color: #a0aec0; transition: 0.3s; font-size: 14px; }
        .nav-item.active { background: var(--primary); color: white; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card-panel { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .btn-io { background: rgba(255,255,255,0.1); border: 1px solid #4a5568; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        #viewModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 600px; padding: 30px; border-radius: 28px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        <span style="font-weight:800;">MPF Pro Master</span>
    </div>
    <div style="display:flex; gap:5px;">
        <div class="nav-item active" onclick="switchTab('home', this)">🏠 儀表板</div>
        <div class="nav-item" onclick="switchTab('tool', this)">✍️ 數據錄入</div>
        <div class="nav-item" onclick="switchTab('market', this)">📊 市場分析</div>
        <div class="nav-item" onclick="switchTab('log', this)">📜 更新日誌</div>
    </div>
    <div style="display: flex; gap: 8px;">
        <button class="btn-io" onclick="handleExport()">📤 導出</button>
        <button class="btn-io" onclick="handleImport()">📥 導入</button>
    </div>
</nav>

<div id="app" class="container"></div>
<div id="viewModal"><div class="modal-content" id="modal-body"></div></div>

<script>
    const DB_KEY = 'MPF_PRO_DATA_V1';
    window.records = [];

    // 修復數據初始化，確保數據格式一致
    function initData() {
        try {
            const raw = localStorage.getItem(DB_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                window.records = parsed.map(r => ({
                    date: r.date,
                    totalA: parseFloat(r.totalA) || 0,
                    totalB: parseFloat(r.totalB) || 0,
                    totalC: parseFloat(r.totalC) || 0,
                    totalAll: parseFloat(r.totalA) || 0,
                    details: Array.isArray(r.details) ? r.details : []
                }));
            }
        } catch (e) {
            console.error("數據加載失敗", e);
            window.records = [];
        }
    }

function switchTab(tabId, el) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    
    // 關鍵修復：切換分頁時重新讀取一次 LocalStorage
    initData(); 
    renderPage(tabId);
}

    function renderPage(id) {
        const app = document.getElementById('app');
        // 映射組件對象
        const components = {
            'home': typeof DashboardComponent !== 'undefined' ? DashboardComponent : null,
            'tool': typeof DataManagerComponent !== 'undefined' ? DataManagerComponent : null,
            'market': typeof MarketComponent !== 'undefined' ? MarketComponent : null,
            'log': typeof AboutLogComponent !== 'undefined' ? AboutLogComponent : null
        };

        const comp = components[id];
        if (comp) {
            app.innerHTML = comp.render();
            if (comp.init) comp.init();
        } else {
            app.innerHTML = `<div class="card-panel">⚠️ 找不到組件 ${id}，請檢查 JS 檔案是否載入。</div>`;
        }
    }

    function closeModal() { document.getElementById('viewModal').style.display = 'none'; }

    function handleExport() {
        const blob = new Blob([JSON.stringify(window.records)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MPF_Backup.json`;
        a.click();
    }

    function handleImport() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const imported = JSON.parse(ev.target.result);
                localStorage.setItem(DB_KEY, JSON.stringify(imported));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    initData();
    window.addEventListener('load', () => renderPage('home'));
</script>

<script src="dashboard.js"></script>
<script src="data-manager.js"></script>
<script src="market.js"></script>
<script src="about-log.js"></script>
</body>
</html>
