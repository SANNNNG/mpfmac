<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPF Pro Master</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --warning: #fbbc04; --dark: #0f172a; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', 'PingFang TC', sans-serif; background: var(--bg); margin: 0; overflow-y: scroll; }
        
        /* 導航列 */
        .navbar { background: var(--dark); color: white; padding: 0 30px; display: flex; align-items: center; height: 70px; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .brand-icon { width: 24px; height: 24px; fill: var(--warning); }
        .nav-group { display: flex; gap: 8px; }
        .nav-item { cursor: pointer; padding: 10px 18px; border-radius: 12px; color: #94a3b8; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 14px; font-weight: 600; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.08); }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); }

        /* 頁面內容容器與切換動畫 */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .page-animate { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 彈窗美化與果凍動畫 */
        #viewModal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.6); 
            z-index: 2000; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(8px);
        }
        
        .modal-content { 
            background: white; 
            width: 95%; 
            max-width: 550px; 
            padding: 30px; 
            border-radius: 30px; 
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: modalShow 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 基礎卡片樣式 (用於各組件) */
        .card-panel { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #f1f5f9; }
        
        button:active { transform: scale(0.97); transition: 0.1s; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="brand" onclick="switchTab('home')">
        <svg class="brand-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        <span style="font-weight:800; font-size:20px; letter-spacing:-0.5px;">MPF Pro Master</span>
    </div>
    <div class="nav-group">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')">🏠 儀表板</div>
        <div class="nav-item" id="nav-tool" onclick="switchTab('tool')">✍️ 數據管理</div>
        <div class="nav-item" id="nav-market" onclick="switchTab('market')">📊 市場分析</div>
        <div class="nav-item" id="nav-log" onclick="switchTab('log')">📜 更新日誌</div>
    </div>
    <div style="display:flex; gap:10px;">
        <button onclick="handleExport()" style="background:rgba(255,255,255,0.05); border:1px solid #334155; color:#cbd5e0; padding:8px 15px; border-radius:8px; cursor:pointer; font-size:12px;">導出</button>
        <button onclick="handleImport()" style="background:rgba(255,255,255,0.05); border:1px solid #334155; color:#cbd5e0; padding:8px 15px; border-radius:8px; cursor:pointer; font-size:12px;">導入</button>
    </div>
</nav>

<div id="app" class="container"></div>

<div id="viewModal" onclick="if(event.target==this) closeModal()">
    <div class="modal-content" id="modal-body"></div>
</div>

<script>
    const DB_KEY = 'MPF_PRO_DATA_V1';
    window.records = [];

    function initData() {
        const raw = localStorage.getItem(DB_KEY);
        window.records = raw ? JSON.parse(raw) : [];
        window.records.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function switchTab(id) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const activeNav = document.getElementById('nav-' + id);
        if(activeNav) activeNav.classList.add('active');
        renderPage(id);
    }

    function renderPage(id) {
        const app = document.getElementById('app');
        
        // 觸發轉場動畫
        app.classList.remove('page-animate');
        void app.offsetWidth; 
        app.classList.add('page-animate');

        const components = {
            'home': typeof DashboardComponent !== 'undefined' ? DashboardComponent : null,
            'tool': typeof DataManagerComponent !== 'undefined' ? DataManagerComponent : null,
            'market': typeof MarketComponent !== 'undefined' ? MarketComponent : null,
            'log': typeof AboutLogComponent !== 'undefined' ? AboutLogComponent : null
        };

        const comp = components[id];
        if (comp) {
            app.innerHTML = comp.render();
            if (comp.init) comp.init();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function closeModal() {
        const modal = document.getElementById('viewModal');
        const content = modal.querySelector('.modal-content');
        content.style.animation = 'modalShow 0.2s reverse forwards';
        setTimeout(() => {
            modal.style.display = 'none';
            content.style.animation = '';
        }, 200);
    }

    function handleExport() {
        const blob = new Blob([JSON.stringify(window.records)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MPF_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function handleImport() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const imported = JSON.parse(ev.target.result);
                localStorage.setItem(DB_KEY, JSON.stringify(imported));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    initData();
    window.addEventListener('load', () => renderPage('home'));
</script>

<script src="dashboard.js"></script>
<script src="data-manager.js"></script>
<script src="market.js"></script>
<script src="about-log.js"></script>
</body>
</html>
